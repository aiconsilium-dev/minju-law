<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>MINJU Admin | CMS</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--red:#ff4d4d;--bg:#fff;--sidebar:#fafafa;--border:#eee;--text:#111;--gray:#666;--light:#f5f5f5}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.6}
a{color:inherit;text-decoration:none}
button{cursor:pointer;font-family:inherit}
input,textarea,select{font-family:inherit;font-size:14px}

/* Layout */
.sidebar{position:fixed;top:0;left:0;width:240px;height:100vh;background:var(--sidebar);border-right:1px solid var(--border);display:flex;flex-direction:column;z-index:100;transition:transform .3s}
.sidebar-logo{padding:24px 20px;font-size:18px;font-weight:700;letter-spacing:.05em;border-bottom:1px solid var(--border)}
.sidebar-logo span{color:var(--red)}
.sidebar-nav{flex:1;padding:12px 0;overflow-y:auto}
.sidebar-item{display:flex;align-items:center;padding:10px 20px;gap:10px;color:var(--gray);font-size:13px;font-weight:500;transition:all .15s;cursor:pointer;border-left:3px solid transparent}
.sidebar-item:hover{background:#f0f0f0;color:var(--text)}
.sidebar-item.active{color:var(--red);border-left-color:var(--red);background:rgba(255,77,77,.04)}
.sidebar-item svg{width:18px;height:18px;flex-shrink:0}
.sidebar-user{padding:16px 20px;border-top:1px solid var(--border);font-size:12px;color:var(--gray)}

.main{margin-left:240px;min-height:100vh}
.topbar{height:56px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 28px;background:#fff;position:sticky;top:0;z-index:50}
.topbar-title{font-size:16px;font-weight:600}
.topbar-actions{display:flex;align-items:center;gap:12px}
.topbar-btn{padding:6px 14px;border:1px solid var(--border);border-radius:6px;background:#fff;font-size:12px;color:var(--gray);transition:all .15s}
.topbar-btn:hover{border-color:var(--red);color:var(--red)}
.hamburger-admin{display:none;background:none;border:none;padding:4px;cursor:pointer}
.hamburger-admin span{display:block;width:20px;height:2px;background:var(--text);margin:4px 0}

.content{padding:28px}

/* Cards */
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:28px}
.kpi-card{background:#fff;border:1px solid var(--border);border-radius:10px;padding:20px;transition:box-shadow .2s}
.kpi-card:hover{box-shadow:0 2px 12px rgba(0,0,0,.06)}
.kpi-label{font-size:12px;color:var(--gray);margin-bottom:4px}
.kpi-value{font-size:28px;font-weight:700}
.kpi-value span{color:var(--red)}
.kpi-sub{font-size:11px;color:var(--gray);margin-top:4px}

/* Table */
.panel{background:#fff;border:1px solid var(--border);border-radius:10px;margin-bottom:20px;overflow:hidden}
.panel-head{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--border)}
.panel-title{font-size:14px;font-weight:600}
table{width:100%;border-collapse:collapse}
th,td{text-align:left;padding:10px 20px;font-size:13px;border-bottom:1px solid var(--border)}
th{background:var(--light);color:var(--gray);font-weight:600;font-size:12px;text-transform:uppercase;letter-spacing:.03em}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(255,77,77,.02)}

/* Buttons */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:6px;font-size:13px;font-weight:500;border:none;transition:all .15s}
.btn-red{background:var(--red);color:#fff}
.btn-red:hover{background:#e63e3e}
.btn-outline{background:#fff;border:1px solid var(--border);color:var(--text)}
.btn-outline:hover{border-color:var(--red);color:var(--red)}
.btn-sm{padding:5px 10px;font-size:12px}
.btn-ghost{background:none;border:none;color:var(--gray);padding:4px 8px;font-size:12px}
.btn-ghost:hover{color:var(--red)}

/* Status */
.badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600}
.badge-green{background:#e6f9e6;color:#2d8a2d}
.badge-yellow{background:#fff8e0;color:#b8860b}
.badge-gray{background:#f0f0f0;color:#666}
.badge-red{background:#ffe6e6;color:#cc0000}

/* Chart bar */
.chart-bar-wrap{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.chart-bar-label{width:40px;font-size:11px;color:var(--gray);text-align:right;flex-shrink:0}
.chart-bar{height:20px;background:var(--light);border-radius:4px;flex:1;overflow:hidden}
.chart-bar-fill{height:100%;background:var(--red);border-radius:4px;transition:width .6s}

/* Grid layouts */
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:20px}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}

/* Cards for members/cases */
.card{background:#fff;border:1px solid var(--border);border-radius:10px;padding:16px;transition:box-shadow .2s}
.card:hover{box-shadow:0 2px 8px rgba(0,0,0,.06)}
.card-img{width:100%;height:140px;background:var(--light);border-radius:6px;margin-bottom:12px;display:flex;align-items:center;justify-content:center;color:#ccc;font-size:12px}
.card-tag{display:inline-block;padding:2px 8px;background:rgba(255,77,77,.08);color:var(--red);border-radius:4px;font-size:11px;font-weight:600;margin-bottom:6px}
.card-title{font-size:14px;font-weight:600;margin-bottom:4px}
.card-desc{font-size:12px;color:var(--gray);line-height:1.5}
.card-date{font-size:11px;color:#aaa;margin-top:8px}
.card-actions{display:flex;gap:6px;margin-top:10px}

/* Member card */
.member-card{text-align:center;padding:20px 16px}
.member-photo{width:72px;height:72px;border-radius:50%;background:var(--light);margin:0 auto 12px;display:flex;align-items:center;justify-content:center;color:#ccc;font-size:11px}
.member-name{font-size:14px;font-weight:600;margin-bottom:2px}
.member-title{font-size:12px;color:var(--gray)}
.member-field{font-size:11px;color:var(--red);margin-top:4px}

/* Form */
.form-group{margin-bottom:16px}
.form-label{display:block;font-size:12px;font-weight:600;color:var(--gray);margin-bottom:6px}
.form-input{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:6px;font-size:14px;transition:border-color .15s;background:#fff}
.form-input:focus{outline:none;border-color:var(--red)}
textarea.form-input{min-height:100px;resize:vertical}
.form-row{display:flex;gap:12px}
.form-row .form-group{flex:1}

/* Preview */
.hero-preview{width:100%;height:200px;background:linear-gradient(rgba(0,0,0,.4),rgba(0,0,0,.6)),var(--light);border-radius:8px;display:flex;align-items:center;justify-content:center;color:#999;font-size:13px;margin-bottom:16px;position:relative;overflow:hidden}

/* List item (practice areas) */
.list-item{display:flex;align-items:center;gap:12px;padding:12px 16px;border-bottom:1px solid var(--border)}
.list-item:last-child{border-bottom:none}
.list-num{width:32px;height:32px;border-radius:50%;background:var(--light);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--gray);flex-shrink:0}
.list-body{flex:1;min-width:0}
.list-body h4{font-size:14px;font-weight:600}
.list-body p{font-size:12px;color:var(--gray);margin-top:2px}
.list-actions{display:flex;gap:4px;flex-shrink:0}
.arrow-btn{width:28px;height:28px;border:1px solid var(--border);border-radius:4px;background:#fff;display:flex;align-items:center;justify-content:center;font-size:14px;cursor:pointer;color:var(--gray);transition:all .15s}
.arrow-btn:hover{border-color:var(--red);color:var(--red)}

/* FAQ */
.faq-item{border:1px solid var(--border);border-radius:8px;margin-bottom:10px;overflow:hidden}
.faq-head{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;cursor:pointer;font-size:13px;font-weight:600}
.faq-body{padding:0 16px 12px;font-size:13px;color:var(--gray);display:none}
.faq-item.open .faq-body{display:block}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:500;display:none;align-items:center;justify-content:center;backdrop-filter:blur(2px)}
.modal-overlay.show{display:flex}
.modal{background:#fff;border-radius:12px;width:90%;max-width:560px;max-height:80vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.15)}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:20px 24px;border-bottom:1px solid var(--border)}
.modal-header h3{font-size:16px;font-weight:600}
.modal-close{width:32px;height:32px;border:none;background:var(--light);border-radius:50%;font-size:18px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--gray)}
.modal-close:hover{background:var(--red);color:#fff}
.modal-body{padding:24px}
.modal-footer{padding:16px 24px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end}

/* Responsive */
@media(max-width:1024px){
  .kpi-grid{grid-template-columns:repeat(2,1fr)}
  .grid-4{grid-template-columns:repeat(2,1fr)}
  .grid-3{grid-template-columns:repeat(2,1fr)}
}
@media(max-width:768px){
  .sidebar{transform:translateX(-100%)}
  .sidebar.open{transform:translateX(0)}
  .main{margin-left:0}
  .hamburger-admin{display:block}
  .kpi-grid{grid-template-columns:1fr 1fr}
  .grid-2{grid-template-columns:1fr}
  .grid-3{grid-template-columns:1fr}
  .grid-4{grid-template-columns:1fr 1fr}
  .content{padding:20px 16px}
  .form-row{flex-direction:column;gap:0}
}
@media(max-width:480px){
  .kpi-grid{grid-template-columns:1fr}
  .grid-4{grid-template-columns:1fr}
}
</style>

// ===== NAVIGATION =====
var currentPage = 'dashboard';
var pageTitles = {dashboard:'대시보드',hero:'히어로 관리',notices:'공지사항',cases:'업무사례 관리',members:'구성원 관리',practice:'업무분야 관리',recovery:'기업회생 관리',consult:'상담문의 관리',settings:'사이트 설정'};

function navigate(page){
  currentPage = page;
  document.getElementById('pageTitle').textContent = pageTitles[page]||page;
  document.querySelectorAll('.sidebar-item').forEach(function(el){el.classList.toggle('active',el.dataset.page===page)});
  document.getElementById('sidebar').classList.remove('open');
  render();
}

function render(){
  var c = document.getElementById('content');
  switch(currentPage){
    case 'dashboard': c.innerHTML = renderDashboard(); break;
    case 'hero': c.innerHTML = renderHero(); break;
    case 'notices': c.innerHTML = renderNotices(); break;
    case 'cases': c.innerHTML = renderCases(); break;
    case 'members': c.innerHTML = renderMembers(); break;
    case 'practice': c.innerHTML = renderPractice(); break;
    case 'recovery': c.innerHTML = renderRecovery(); break;
    case 'consult': c.innerHTML = renderConsult(); break;
    case 'settings': c.innerHTML = renderSettings(); break;
  }
}

function openModal(title,bodyHtml,footerHtml){
  document.getElementById('modalTitle').textContent = title;
  document.getElementById('modalBody').innerHTML = bodyHtml;
  document.getElementById('modalFooter').innerHTML = footerHtml||'';
  document.getElementById('modalOverlay').classList.add('show');
}
function closeModal(){document.getElementById('modalOverlay').classList.remove('show')}

  h += '<div class="panel"><div class="panel-head"><span class="panel-title">최근 상담문의</span><button class="btn btn-sm btn-outline" onclick="navigate(\'consult\')">전체보기</button></div>';
  h += '<table><th>이름</th><th>분야</th><th>날짜</th><th>상태</th>';

  h += '</table></div>';
  // Recent notice
  h += '<div><div class="panel"><div class="panel-head"><span class="panel-title">최근 공지사항</span><button class="btn btn-sm btn-outline" onclick="navigate(\'notices\')">전체보기</button></div>';

  h += '</table></div>';
  // Chart
  h += '<div class="panel" style="margin-top:20px"><div class="panel-head"><span class="panel-title">주간 페이지뷰</span></div><div style="padding:16px 20px">';
  var days = ['월','화','수','목','금','토','일'];

  days.forEach(function(d,i){h += '<div class="chart-bar-wrap"><span class="chart-bar-label">'+d+'</span><div class="chart-bar"><div class="chart-bar-fill" style="width:'+vals[i]+'%"></div></div><span style="font-size:11px;color:#999;width:30px">'+Math.round(vals[i]*3.5)+'</span></div>'});

function kpiCard(label,val,unit,sub){
  return '<div class="kpi-card"><div class="kpi-label">'+label+'</div><div class="kpi-value">'+val+'<span style="font-size:14px;margin-left:2px">'+unit+'</span></div><div class="kpi-sub">'+sub+'</div></div>';
}

function statusBadge(s){
  if(s==='게시중') return '<span class="badge badge-green">게시중</span>';
  if(s==='임시저장') return '<span class="badge badge-gray">임시저장</span>';
  if(s==='미확인') return '<span class="badge badge-red">미확인</span>';
  if(s==='확인') return '<span class="badge badge-yellow">확인</span>';
  if(s==='상담완료') return '<span class="badge badge-green">상담완료</span>';
  return '<span class="badge badge-gray">'+s+'</span>';
}

  var h='<div class="panel"><div class="panel-head"><span class="panel-title">상담문의 접수 현황</span><div style="display:flex;gap:8px"><span class="badge badge-red" style="cursor:pointer">미확인 '+data.consult.filter(function(c){return c.status==='미확인'}).length+'</span></div></div>';
  h+='<table><th>이름</th><th>연락처</th><th>분야</th><th>날짜</th><th>상태</th><th style="width:120px">변경</th>';
  data.consult.forEach(function(c,i){
    var states=['미확인','확인','상담완료'];
    var nextIdx=states.indexOf(c.status);
    var nextState=nextIdx<2?states[nextIdx+1]:null;
    h+='<tr><td>'+c.name+'</td><td>'+c.phone+'</td><td>'+c.field+'</td><td>'+c.date+'</td><td>'+statusBadge(c.status)+'</td>';
    h+='<td>'+(nextState?'<button class="btn btn-sm btn-outline" onclick="changeConsultStatus('+i+',\''+nextState+'\')">'+nextState+'</button>':'<span style="color:#999;font-size:12px">완료</span>')+'</td></tr>';
  });
  h+='</table></div>';
  return h;
}

function changeConsultStatus(idx,status){data.consult[idx].status=status;render()}

function renderSettings(){
  var s=data.settings;
  var h='<div class="grid-2">';
  h+='<div class="panel"><div class="panel-head"><span class="panel-title">기본 정보</span></div><div style="padding:20px">';
  h+='<div class="form-group"><label class="form-label">법인명</label><input class="form-input" id="sName" value="'+s.name+'"></div>';
  h+='<div class="form-group"><label class="form-label">전화번호</label><input class="form-input" id="sPhone" value="'+s.phone+'"></div>';
  h+='<div class="form-group"><label class="form-label">주소</label><input class="form-input" id="sAddr" value="'+s.address+'"></div>';
  h+='<div class="form-group"><label class="form-label">이메일</label><input class="form-input" id="sEmail" value="'+s.email+'"></div>';
  h+='<button class="btn btn-red" onclick="data.settings.name=document.getElementById(\'sName\').value;data.settings.phone=document.getElementById(\'sPhone\').value;data.settings.address=document.getElementById(\'sAddr\').value;data.settings.email=document.getElementById(\'sEmail\').value;alert(\'저장되었습니다.\')">저장</button>';
  h+='</div></div>';

  h+='<div><div class="panel"><div class="panel-head"><span class="panel-title">네비게이션 메뉴</span></div><div style="padding:20px">';
  s.navMenus.forEach(function(m,i){
    h+='<div style="display:flex;gap:8px;align-items:center;margin-bottom:8px">';
    h+='<span style="width:24px;text-align:center;color:#999;font-size:12px">'+(i+1)+'</span>';
    h+='<input class="form-input" value="'+m+'" onchange="data.settings.navMenus['+i+']=this.value" style="flex:1">';
    h+='<button class="arrow-btn" onclick="moveNav('+i+',-1)" '+(i===0?'disabled style="opacity:.3"':'')+'>&#9650;</button>';
    h+='<button class="arrow-btn" onclick="moveNav('+i+',1)" '+(i===s.navMenus.length-1?'disabled style="opacity:.3"':'')+'>&#9660;</button>';
    h+='</div>';
  });
  h+='</div></div>';

  h+='<div class="panel" style="margin-top:20px"><div class="panel-head"><span class="panel-title">푸터 텍스트</span></div><div style="padding:20px">';
  h+='<div class="form-group"><textarea class="form-input" id="sFooter" rows="3">'+s.footer+'</textarea></div>';
  h+='<button class="btn btn-red" onclick="data.settings.footer=document.getElementById(\'sFooter\').value;alert(\'저장되었습니다.\')">저장</button>';
  h+='</div></div></div>';
  h+='</div>';
  return h;
}

function moveNav(idx,dir){
  var t=idx+dir;if(t<0||t>=data.settings.navMenus.length)return;
  var tmp=data.settings.navMenus[idx];data.settings.navMenus[idx]=data.settings.navMenus[t];data.settings.navMenus[t]=tmp;
  render();
}

// Init
render();
</script>
</body>
</html>
